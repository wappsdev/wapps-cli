version: 2
project_name: wapps

builds:
  - id: wapps
    main: ./main.go
    binary: wapps
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      # cmd.Version is consumed by rootCmd.Version → enables `wapps --version`.
      # Previously pointed at main.version which had no matching var (no-op).
      - -s -w -X github.com/wappsdev/wapps-cli/cmd.Version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

brews:
  - name: wapps
    # Place wapps.rb under Formula/ per Homebrew tap convention
    # (default is repo root; mixing with .gitkeep / README in root hides the formula from `brew tap`).
    directory: Formula
    repository:
      owner: wappsdev
      name: homebrew-tap
      branch: main
      # Explicit token (auto-provided GITHUB_TOKEN only has wapps-cli repo scope;
      # HOMEBREW_TAP_PAT has cross-repo `repo` scope for wappsdev/homebrew-tap push).
      token: "{{ .Env.HOMEBREW_TAP_PAT }}"
    homepage: https://github.com/wappsdev/wapps-cli
    description: "wapps umbrella CLI for infra-tofu monorepo"
    license: MIT
    commit_author:
      name: wapps-release-bot
      email: bot@wapps.co
    install: |
      bin.install "wapps"
    caveats: |
      Enable the AI-safe "wapps-secrets" skill so coding agents (Claude Code,
      Cursor, Aider) use apply-only secret commands and never read your .env:

        wapps skill install                 # user-wide (~/.claude/skills) — recommended
        wapps skill install --local --copy  # committable copy in the current repo

      After a future `brew upgrade wapps`, the skill auto-refreshes on the next
      `wapps` run — no need to re-install.
    test: |
      assert_match "wapps", shell_output("#{bin}/wapps --help")
