version: 2
project_name: wapps

builds:
  - id: wapps
    main: ./main.go
    binary: wapps
    goos: [linux, darwin]
    goarch: [amd64, arm64]
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}

checksum:
  name_template: 'checksums.txt'

brews:
  - name: wapps
    repository:
      owner: wappsdev
      name: homebrew-tap
    homepage: https://github.com/wappsdev/wapps-cli
    description: "wapps umbrella CLI for infra-tofu monorepo"
    license: MIT
    install: |
      bin.install "wapps"
    test: |
      assert_match "wapps", shell_output("#{bin}/wapps --help")
