name: Release
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
      - uses: goreleaser/goreleaser-action@v6
        with:
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Used by .goreleaser.yml `brews[].repository.token` template substitution
          # (cross-repo push to wappsdev/homebrew-tap; auto GITHUB_TOKEN scope insufficient).
          HOMEBREW_TAP_PAT: ${{ secrets.HOMEBREW_TAP_PAT }}
